<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07090f">
  <title>404 — Blue Tusk Studio</title>
  <meta name="description" content="That page wandered off. Let's get you back home.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2307090f'/%3E%3Cpath d='M18 44 C 22 28, 32 18, 46 18 C 40 28, 34 36, 28 44 Z' fill='%234f8ef7'/%3E%3Cpath d='M22 46 C 26 34, 34 26, 44 24' stroke='%237eb3ff' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07090f; --bg2: #0d1117; --accent: #4f8ef7; --accent2: #7eb3ff;
      --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.14);
      --text: #e8edf5; --muted: #8892a8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(79,142,247,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .wrap { text-align: center; max-width: 520px; position: relative; z-index: 1; }
    .mark {
      display: inline-flex;
      width: 56px; height: 56px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      align-items: center; justify-content: center;
      margin-bottom: 28px;
    }
    .mark svg { width: 32px; height: 32px; }
    .code {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .code::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 12px var(--accent);
    }
    h1 {
      font-size: clamp(3rem, 9vw, 6rem);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 18px;
    }
    h1 span {
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.25);
    }
    p { color: var(--muted); line-height: 1.7; margin-bottom: 32px; font-size: 1rem; }
    .ctas { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 26px;
      border-radius: 8px;
      font-size: 0.84rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s, border-color 0.2s, color 0.2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border-strong); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }
    .meta {
      margin-top: 36px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <path d="M18 44 C 22 28, 32 18, 46 18 C 40 28, 34 36, 28 44 Z" fill="#4f8ef7"/>
        <path d="M22 46 C 26 34, 34 26, 44 24" stroke="#7eb3ff" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <p class="code">Error 404</p>
    <h1>Page <span>Not Found.</span></h1>
    <p>That page wandered off. Could be a typo, a moved link, or a feature we shelved. Either way, you're in good company — let's get you back home.</p>
    <div class="ctas">
      <a href="/" class="btn btn-primary">← Back to home</a>
      <a href="/#games" class="btn btn-ghost">Browse games</a>
    </div>
    <div class="meta">BLUE_TUSK_STUDIO // STATUS: PAGE_MISSING</div>
  </div>
</body>
</html>
